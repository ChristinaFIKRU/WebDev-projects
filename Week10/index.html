const movie = {

const car = {
  make: "Toyota",
  model: "Camry",
  year: 2020,
};

// 1. Update the year to 2024
car.year = 2024;

// 2. Add a color property set to any color you like
car.color = "blue";

// 3. Delete the model property
delete car.model;

// 4. Log the full object to see the result
console.log(car);

// object methods 
const calculator = {
  add: function (a, b) {
    return a + b;
  },
  subtract: function (a, b) {
    return a - b;
  },
};

console.log(calculator.add(5, 3)); // 8
console.log(calculator.subtract(10, 4)); // 6

// modern java script allows us to write methods in a more concise way:

const calculator = {
  add(a, b) {
    return a + b;
  },
  subtract(a, b) {
    return a - b;
  },
};

//THIS -> refers to the object the method belongs to. it 
// lets the method access the objects own properties

const person = {
  name: "Alex",
  greet() {
    console.log(`Hello, my name is ${this.name}!`);
  },
};

person.greet(); // Hello, my name is Alex!

// THIS -> inside a method, this = the obj


// Built in Object Methods
// Object.keys() -> returns an array of the objects keys
const person = { name: "alex", age : 22, city: "DC"};

console.log(Object.keys(person)); // ["name", "age", "city"]

//  Object.values() -> returns an array of the objects values

console.log(Object.values(person)); // ["alex", 22, "DC"]

//  Object.entries() -> returns an array of the objects key value pairs as sub arrays

console.log(Object.entries(person)); // [["name", "alex"], ["age", 22], ["city", "DC"]]

// example of using Object.entries to loop through an object

const laptop = {
  brand: "Apple",
  model: "MacBook Pro",
  ram: 16,
  storage: 512,
};

// 1. Log all the keys
console.log(Object.keys(laptop));

// 2. Log all the values
console.log(Object.values(laptop));

// 3. Log all key-value pairs
console.log(Object.entries(laptop));
