<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lower East Side and Washington Square</title>

<style>

/* Global Styles */
/* @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap'); */

*{
box-sizing:border-box;
margin:0;
}

/* page spacing */
body{
margin:0;
padding-top:100px;
background: url("img/East-vilage/EA1.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* some generic styles for our div elements so we can see them nest */
div{
border:none;
/* background-image:url('../img/ab-me/M1.jpeg'); */
}

/* generic to specific with our styles */
.gal1 h1{
color:rgb(238, 237, 237);
padding:1rem;
}

html{
font-family:'Times Roman',serif,sans-serif;

/* page background image */
background:url('../img/East-vilage/EA13.jpeg') no-repeat center center fixed;
background-size:cover;
}

/* MASONRY GALLERY */

.container{
max-width:1100px;
margin:0 auto;

/* stacked image layout */
column-count:3;
column-gap:20px;
}

.card{
break-inside:avoid;
margin-bottom:20px;
position:relative;
}

.card img{
width:100%;
height:auto;
display:block;

/* polaroid border */
border:10px solid rgb(22,27,34);
border-bottom-width:45px;
}

.card p{
font-size:1rem;
color:#333;
position:absolute;
bottom:2px;
left:0;
width:100%;
text-align:center;
}

/* HEADER */

.main-header{
display:flex;
justify-content:space-between;
align-items:center;

position:fixed;
top:0;
left:0;
height:100px;
width:100%;

padding:1rem;
z-index:1000;

background:rgba(242, 235, 235, 0.3);
backdrop-filter:blur(6px);
}

.main-header h4{
font-size:1.2rem;
color:rgb(234, 234, 234);
}

nav{
display:flex;
gap:20px;
}

nav a{
color:rgb(229, 229, 229);
font-size:1.2rem;
}

/* gal dropped down menu */

.dropdown{
position:relative;
display:inline-block;
}

.dropdown-content{
display:none;
position:absolute;
background-color:#f9f9f9;
min-width:160px;
box-shadow:0px 8px 16px rgba(0,0,0,0.2);
z-index:1;
}

.dropdown-content a{
color:black;
padding:12px 16px;
text-decoration:none;
display:block;
}

.dropdown:hover .dropdown-content{
display:block;
}

.dropdown-content{
background:rgba(130, 155, 157, 0.8);
}

.dropdown-content a{
color:rgb(22,27,34);
}

/* change nav background when scrolling */

.main-header.scrolled{
background-image:url('img/East-vilage/EA5.jpeg');
background-size:cover;
background-position:center;
}

/* MEDIA QUERIES */

/* Tablet */
@media (max-width:1000px){

.container{
column-count:2;
}

}

/* Phone */
@media (max-width:600px){

.container{
column-count:1;
}

}

footer{
min-height:100px;
background-color:rgb(204,156,224);
padding:20px;
text-align:center;
border:2px solid rgb(212,168,67);
margin-top:20px;
}

</style>
</head>

<body>

<header class="main-header">

<h4>Through my lens </h4>

<nav>

<a href="index.html">Home</a>
<a href="index.html#about-text">About</a>
<a href="index.html#dest">Destinations</a>

<!-- dropdown gallery menu -->

<div class="dropdown">
<a href="#">Gallery</a>

<div class="dropdown-content">
<a href="island.html">Island</a>
<a href="sted.html">Christansted</a>

</div>

</div>

<a href="#footer">Contact</a>

<script>

/* change nav background when scrolling */

window.addEventListener("scroll",function(){

const header=document.querySelector(".main-header");

if(window.scrollY>50){
header.classList.add("scrolled");
}else{
header.classList.remove("scrolled");
}

});

</script>

</body>
</html>
