<!DOCTYPE html>
<html lang="en">3

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Christiansted Monument</title>

<style>

/* Global Styles */
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
  padding-top: 100px;

  /* page background image */
  background: url("img/Christiansted/c3.jpeg") no-repeat center center fixed;
  background-size: cover;
}

html {
  font-family: 'Times New Roman', serif, sans-serif;
}

img {
  display: block;
}

/* SLIDER CONTAINER */
.container {
  display: flex;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

/*  EACH SLIDE */
.card {
  flex: 0 0 100%;
  scroll-snap-align: start;
}

/*  SAME SIZE IMAGES */
.card img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* HEADER */
.main-header {
   display: flex;
   justify-content: space-between;
   align-items: center;

   position: fixed;
   top: 0;
   left: 0;
   height: 100px;
   width: 100%;

   padding: 1rem;
   z-index: 1000;

   background: rgba(0,0,0,0.3);
   backdrop-filter: blur(6px);
}

.main-header h4 {
    font-size: 1.2rem;
    color: rgb(8, 1, 1);
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: rgb(0, 0, 0);
    font-size: 1.2rem;
}

/* dropdown */
.dropdown {
    position: relative;
    display: inline-block;
}

.dropdown-content {
    display: none;
    position: absolute;
    min-width: 160px;
    z-index: 1;
    background: rgba(17, 180, 191, 0.8);
}

.dropdown-content a {
    color: rgb(22, 27, 34);
    padding: 12px 16px;
    display: block;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* scroll header effect */
.main-header.scrolled{
  background-image: url('img/Christiansted/c3.jpeg');
  background-size: cover;
  background-position: center;
}

/* Footer */
footer {
  min-height: 100px;
  background-color: rgb(204, 156, 224);
  padding: 20px;
  text-align: center;
  border: 2px solid rgb(212, 168, 67);
  margin-top: 20px;
}

/* BUTTONS */
.slider-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  z-index: 2000;
}

.prev { left: 10px; }
.next { right: 10px; }

</style>
</head>

<body>

<header class="main-header">
 <h4> Through my lens </h4>

<nav>
<a href="index.html">Home</a>
<a href="index.html#about-text">About</a>
<a href="index.html#dest">Destinations</a>

<div class="dropdown">
  <a href="#">Gallery</a>
  <div class="dropdown-content">
    <a href="island.html">Island </a>
    <a href="sted.html">Christansted </a>
    <a href="east.html"> East Side</a>
  </div>
</div>

<a href="#footer"> Contact</a>
</nav>

<!-- SLIDER BUTTONS -->
<button class="slider-btn prev" onclick="scrollSlider(-1)">⬅</button>
<button class="slider-btn next" onclick="scrollSlider(1)">➡</button>

<!--  SLIDER -->

<script>

/* change nav background when scrolling */
window.addEventListener("scroll", function() {
  const header = document.querySelector(".main-header");

  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});

/* slider buttons */
function scrollSlider(direction) {
  const container = document.querySelector(".container");
  container.scrollBy({
    left: window.innerWidth * direction,
    behavior: "smooth"
  });
}

</script>

</body>
</html>
