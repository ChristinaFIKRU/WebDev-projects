<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Christiansted Monument</title>

<style>

/* Global Styles */
/* @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap'); */

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
  padding-top: 100px;

  /* page background image */
  background: url("img/Christiansted/c3.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* some generic styles for our div elements so we can see them nest */
/* FIXED: removed background-image and border from generic div rule —
   it was applying to every .card div and breaking the polaroid look */
div {
  border: none;
  background-image: none;
}

/* generic to specific with our styles */
.gal1 h1{
  color: rgb(10, 1, 1);
  padding: 1rem;
}

html {
  font-family: 'Times New Roman', serif, sans-serif;
}

.container {
  max-width: 900px;

  /* centers the container */
  margin: 0 auto;

  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  justify-content: space-evenly;
}

/* .img card{
    display: inline-flex;
    border: 4px solid rgb(20, 184, 166);
    padding: 1 rem;
 }
     */


.card {
  width: 260px;
  margin: 10px;
  position: relative;
  background: none;
  border: none;
}

.card img {

  /* images fill the card width */
  width: 100%;

  /* equal image size */
  height: 200px;
  object-fit: cover;
  display: block;

  /* polaroid border */
  border: 10px solid rgb(22, 27, 34);

  /* space for caption */
  border-bottom-width: 50px;
}

.card p {
  font-size: 1rem;
  color: rgb(200, 200, 200);

  position: absolute;
  bottom: 10px;
  left: 0;

  width: 100%;
  text-align: center;
  margin: 0;

  font-style: italic;
}

/* HEADER */

.main-header {
   display: flex;
   justify-content: space-between;
   align-items: center;

   position: fixed;
   top: 0;
   left: 0;
   height: 100px;
   width: 100%;

   padding: 1rem;
   z-index: 1000;

   background: rgba(0,0,0,0.3);
   backdrop-filter: blur(6px);
}

.main-header h4 {
    font-size: 1.2rem;
    color: rgb(8, 1, 1);
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: rgb(0, 0, 0);
    font-size: 1.2rem;
}

/* gal dropped down menu */
.dropdown {
    position: relative;
    display: inline-block;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: #f9f9f9;
    min-width: 160px;
    box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
    z-index: 1;
}

.dropdown-content a {
    color: black;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}

.dropdown:hover .dropdown-content {
    display: block;
}

.dropdown-content{
    background: rgba(17, 180, 191, 0.8);
}

.dropdown-content a{
    color:rgb(22, 27, 34);
}


/* change nav background when scrolling */

.main-header.scrolled{
  background-image: url('img/Christiansted/c3.jpeg');
  background-size: cover;
  background-position: center;
}

/* MEDIA QUERIES */

/* Tablet Landscape */
@media screen and (width <= 1024px) {
  .container {
    width: 80%;
  }

  .card{
    flex-basis: 45%;
  }

}

/* Smaller than an Ipad Classic AKA Phone */
@media screen and (width < 768px) {

    .container {
      width: 100%;
      bottom: 1%;
      padding: 1.5rem;
    }

    .card {
      width: 90%;
      margin: 8px auto;
    }

    .card p {
      flex-direction: column;
      padding: 0.75rem;
      text-align: center;
    }

    .card img{
        max-width: 100%;
    }

}

footer {
  min-height: 100px;
  background-color: rgb(204, 156, 224);
  padding: 20px;
  text-align: center;
  border: 2px solid rgb(212, 168, 67);
  margin-top: 20px;
}

</style>
</head>

<body>

<header class="main-header">
 <h4> Through my lens - Photography site</h4>

<script>

/* change nav background when scrolling */

window.addEventListener("scroll", function() {

const header = document.querySelector(".main-header");

if (window.scrollY > 50) {
header.classList.add("scrolled");
} else {
header.classList.remove("scrolled");
}

});

</script>

</html>
